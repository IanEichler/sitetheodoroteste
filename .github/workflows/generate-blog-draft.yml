name: Gerar rascunho de artigo do blog

on:
  schedule:
    # Roda todo dia às 09:00 (horário de Brasília, UTC-3 -> 12:00 UTC).
    # O próprio script decide se já passou tempo suficiente desde o
    # último artigo (configurável no admin) antes de gerar algo novo.
    - cron: '0 12 * * *'
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions do GitHub

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar rascunho (se estiver na hora)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-blog-draft.js
