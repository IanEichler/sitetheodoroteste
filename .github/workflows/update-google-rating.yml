name: Atualizar nota do Google

on:
  schedule:
    # Roda todo dia às 07:00 (horário de Brasília, UTC-3 -> 10:00 UTC).
    - cron: '0 10 * * *'
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions do GitHub

jobs:
  update-rating:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Buscar nota no Google e atualizar site
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        # GOOGLE_PLACE_ID é opcional: o script descobre o Place ID sozinho se não for definido
        run: node scripts/update-google-rating.js
