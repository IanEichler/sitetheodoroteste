  <style>
    .post-wrap { max-width: 720px; margin: 0 auto; padding: 150px 5vw 90px; }
    .post-area { font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .post-title { font-family: 'Syne', sans-serif; font-size: clamp(1.9rem, 4vw, 2.7rem); font-weight: 600; color: var(--forest); line-height: 1.2; margin-bottom: 1rem; }
    .post-date { font-size: .82rem; color: var(--text-light); margin-bottom: 2rem; }
    .post-cover { width: 100%; max-height: 420px; object-fit: cover; border-radius: 12px; margin-bottom: 2.25rem; display: block; }
    .post-content { font-size: 1.02rem; color: var(--text-mid); line-height: 1.85; }
    .post-content p { margin-bottom: 1.35rem; }
    .post-cta {
      margin-top: 3rem; padding: 2rem; border-radius: 12px; background: var(--forest-deep); text-align: center;
    }
    .post-cta p { color: rgba(250,250,248,.75); margin-bottom: 1.1rem; }
    .post-cta a.btn-wpp { display: inline-flex; }
    .post-back { display: inline-block; margin-bottom: 2rem; font-size: .82rem; font-weight: 600; color: var(--forest); text-decoration: none; }
    .post-back:hover { text-decoration: underline; }
    .post-notfound { text-align: center; padding: 4rem 0; color: var(--text-light); }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-back" onclick="history.length>1&&history.back();return false;">&#8592; <span>Voltar</span></a>

      <li><a href="../index.html#areas">Áreas</a></li>
      <li><a href="../index.html#sobre">Sobre</a></li>

    </ul>
    <a href="https://wa.me/5566999843063" class="nav-cta" target="_blank" rel="noopener">Fale sobre seu caso</a>
  </nav>

  <main class="post-wrap" id="postWrap">
    <p class="post-notfound">Carregando artigo...</p>
  </main>

  <footer>
    <span>© <span id="footerYear"></span> Theodoro e Porto Advocacia · CNPJ 31.598.704/0001-31 · Desenvolvido por Ian Eichler</span>
    <a href="../index.html">Voltar ao site</a>
  </footer>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    const AREA_LABELS = { geral: 'Geral', previdenciario: 'Previdenciário', trabalhista: 'Trabalhista', civil: 'Civil', familia: 'Família', consumidor: 'Consumidor' };

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    function getSlug() {
      const params = new URLSearchParams(location.search);
      if (params.get('slug')) return params.get('slug');
      // Suporta /blog/<slug> reescrito pelo .htaccess sem query string
      const parts = location.pathname.split('/').filter(Boolean);
      const last = parts[parts.length - 1];
      return last && last !== 'post.html' && last !== 'blog' ? decodeURIComponent(last) : '';
    }

    function renderNotFound() {
      document.getElementById('postWrap').innerHTML = `
        <p class="post-notfound">Artigo não encontrado.<br><a href="./" class="post-back" style="margin-top:1rem">← Ver todos os artigos</a></p>`;
    }

    function renderPost(p) {
      document.title = p.title + ' | Theodoro & Porto Advocacia';
      document.getElementById('pageTitle').textContent = p.title + ' | Theodoro & Porto Advocacia';
      document.getElementById('metaDescription').setAttribute('content', p.excerpt || p.title);
      document.getElementById('ogTitle').setAttribute('content', p.title);
      document.getElementById('ogDescription').setAttribute('content', p.excerpt || p.title);
      if (p.cover_image) document.getElementById('ogImage').setAttribute('content', p.cover_image);
      const url = 'https://theodoroeporto.adv.br/blog/' + p.slug;
      document.getElementById('ogUrl').setAttribute('content', url);
      document.getElementById('canonicalLink').setAttribute('href', url);

      const date = p.published_at ? new Date(p.published_at).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' }) : '';
      const paragraphs = (p.content || '').split(/\n{2,}/).map(par => `<p>${escapeHtml(par).replace(/\n/g, '<br>')}</p>`).join('');

      document.getElementById('postWrap').innerHTML = `
        <a href="./" class="post-back">← Ver todos os artigos</a>
        <div class="post-area">${AREA_LABELS[p.area] || 'Geral'}</div>
        <h1 class="post-title">${escapeHtml(p.title)}</h1>
        <div class="post-date">${date}</div>
        ${p.cover_image ? `<img class="post-cover" src="${p.cover_image}" alt="${escapeHtml(p.title)}" />` : ''}
        <div class="post-content">${paragraphs}</div>
        <div class="post-cta">
          <p>Precisa de ajuda jurídica sobre esse assunto? Fale com a nossa equipe, a primeira consulta é gratuita.</p>
          <a class="btn-wpp" href="https://wa.me/5566999843063?text=Oi%2C+li+o+artigo+sobre+%22${encodeURIComponent(p.title)}%22+e+gostaria+de+uma+consulta." target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Falar pelo WhatsApp
          </a>
        </div>`;

      const schema = {
        '@context': 'https://schema.org',
        '@type': 'Article',
        headline: p.title,
        description: p.excerpt || '',
        datePublished: p.published_at || '',
        image: p.cover_image ? [p.cover_image] : undefined,
        author: { '@type': 'Organization', name: 'Theodoro & Porto Advocacia' },
        publisher: { '@type': 'Organization', name: 'Theodoro & Porto Advocacia', logo: { '@type': 'ImageObject', url: 'https://theodoroeporto.adv.br/logo-gold.png' } },
        mainEntityOfPage: url,
      };
      document.getElementById('articleSchema').textContent = JSON.stringify(schema);
    }

    const slug = getSlug();
    if (!slug) {
      renderNotFound();
    } else {
      const _SB_URL = 'https://wmzfehnczvdraeninzcf.supabase.co/rest/v1/blog_posts?select=*&status=eq.published&slug=eq.' + encodeURIComponent(slug);
      const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtemZlaG5jenZkcmFlbmluemNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjUwNjcsImV4cCI6MjA5NzkwMTA2N30.Z5kUqetdkEsidfZMV_zVhck2S0vV5tFcB24nqp5vJBY';
      fetch(_SB_URL, { headers: { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY } })
        .then(r => r.json())
        .then(rows => {
          if (Array.isArray(rows) && rows.length) renderPost(rows[0]);
          else renderNotFound();
        })
        .catch(() => renderNotFound());
    }
  </script>

</body>
</html>
