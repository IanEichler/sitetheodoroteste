<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../logo-symbol-gold.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Todos os canais de contato da Theodoro & Porto Advocacia em um só lugar." />
  <title>Links — Theodoro &amp; Porto Advocacia</title>
  <link rel="canonical" href="https://theodoroeporto.adv.br/links/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://theodoroeporto.adv.br/links/" />
  <meta property="og:title" content="Theodoro & Porto Advocacia — Nossos Links" />
  <meta property="og:description" content="Acesse nosso site, fale no WhatsApp e siga nossas redes — tudo em um só lugar." />
  <meta property="og:image" content="https://theodoroeporto.adv.br/group.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Theodoro & Porto Advocacia — Nossos Links" />
  <meta name="twitter:description" content="Acesse nosso site, fale no WhatsApp e siga nossas redes — tudo em um só lugar." />
  <meta name="twitter:image" content="https://theodoroeporto.adv.br/group.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:      #133F3B;
      --forest-dark: #0d2e2b;
      --forest-deep: #081a18;
      --gold:        #C9A84C;
      --gold-light:  #E2C068;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(120% 90% at 50% -10%, #1a5850 0%, var(--forest-deep) 55%, #050e0d 100%);
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    body { position: relative; overflow-x: hidden; }
    body::before {
      content: '';
      position: fixed;
      inset: -25%;
      background:
        radial-gradient(38% 30% at 25% 20%, rgba(201,168,76,.12) 0%, transparent 70%),
        radial-gradient(42% 34% at 78% 65%, rgba(26,88,80,.45) 0%, transparent 70%);
      animation: bgDrift 24s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes bgDrift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(4%, -5%) scale(1.1); }
      100% { transform: translate(-4%, 4%) scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none; }
    }
    .page { position: relative; z-index: 1; }

    body {
      display: flex;
      justify-content: center;
      padding: .15rem 1.25rem 3rem;
    }

    .page {
      width: 100%;
      max-width: 440px;
    }

    /* ── HEADER ── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: .3rem;
    }
    .brand-logo { height: 208px; width: auto; margin-bottom: 0; }
    .brand-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: .01em; margin-top: -2.3rem; }
    .brand-name em { color: var(--gold); font-style: normal; }
    .brand-sub { font-size: 1.3rem; color: var(--gold); margin-top: .15rem; display: inline-block; animation: brandSubBounce 1.6s ease-in-out infinite; }
    @keyframes brandSubBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(6px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .brand-sub { animation: none; }
    }

    /* ── LINKS ── */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    /* Link com arte completa enviada pelo admin: a imagem crua É o botão, sem nenhum efeito */
    .link-banner {
      display: block;
      width: 100%;
      text-decoration: none;
      line-height: 0;
    }
    .link-banner img { display: block; width: 100%; height: auto; }

    /* Link sem imagem: botão de texto simples */
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 5.2rem;
      border-radius: 22px;
      padding: .75rem 1.5rem;
      text-decoration: none;
      text-align: center;
      background: linear-gradient(135deg, #1c5a53 0%, var(--forest) 45%, var(--forest-dark) 78%, #071815 100%);
      box-shadow: 0 12px 28px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .link-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.08); }
    .link-btn:active { transform: translateY(0); }

    .link-text { color: #fff; line-height: 1.28; }
    .link-title { font-size: 1.15rem; font-weight: 700; font-family: 'Syne', sans-serif; }

    .empty-msg { color: rgba(255,255,255,.55); font-size: .9rem; text-align: center; padding: 2rem 0; }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 3rem;
      text-align: center;
    }
    .page-footer a {
      color: var(--gold);
      font-size: .8rem;
      text-decoration: none;
      font-weight: 600;
    }
    .page-footer a:hover { text-decoration: underline; }
    .page-footer .copy {
      display: block;
      margin-top: .6rem;
      color: rgba(255,255,255,.3);
      font-size: .72rem;
    }

    @media (max-width: 380px) {
      .links-list { gap: 1.3rem; }
      .link-btn { min-height: 4.6rem; padding: .65rem 1.1rem; }
      .link-title { font-size: 1rem; }
    }

    /* ── SCROLL HINT (mobile) ── */
    .scroll-hint {
      display: none;
      position: fixed;
      right: 1rem;
      bottom: 1.1rem;
      z-index: 10;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(201,168,76,.16);
      border: 1px solid rgba(201,168,76,.35);
      backdrop-filter: blur(6px);
      opacity: 1;
      transition: opacity .3s ease;
      pointer-events: none;
    }
    .scroll-hint.hide { opacity: 0; }
    .scroll-hint svg {
      position: absolute;
      width: 26px;
      height: 26px;
      color: var(--gold-light);
      animation: scrollHintSlide 1.6s cubic-bezier(.5,0,.5,1) infinite;
    }
    @keyframes scrollHintSlide {
      0%   { transform: translateY(-16px); opacity: 0; }
      35%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(16px); opacity: 0; }
    }
    @media (max-width: 640px) {
      .scroll-hint { display: flex; }
    }
    @media (prefers-reduced-motion: reduce) {
      .scroll-hint svg { animation: none; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="brand-header">
      <img class="brand-logo" src="../logo-gold.png" alt="Theodoro & Porto" onerror="this.style.display='none'" />
      <div class="brand-name">Nossos links</div>
      <div class="brand-sub">↓</div>
    </div>

    <div class="links-list" id="linksList">
      <p class="empty-msg">Carregando...</p>
    </div>

    <div class="page-footer">
      <a href="../index.html">← Voltar ao site</a>
      <span class="copy">© <span id="footerYear"></span> Theodoro &amp; Porto Advocacia</span>
    </div>
  </div>

  <div class="scroll-hint" id="scrollHint" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
  </div>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    function loadLinks() {
      try {
        const saved = JSON.parse(localStorage.getItem('tp_data') || '{}');
        return saved.links || [];
      } catch (e) { return []; }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    /* Corrige links salvos sem protocolo (ex: "wa.me/55...") que o navegador
       trataria como caminho relativo desta página, não como link externo. */
    function normalizeUrl(url) {
      url = (url || '').trim();
      if (!url) return url;
      if (/^(https?:|mailto:|tel:)/i.test(url)) return url;
      return 'https://' + url;
    }

    function render(links) {
      const wrap = document.getElementById('linksList');
      if (!links || !links.length) {
        wrap.innerHTML = '<p class="empty-msg">Nenhum link disponível no momento.</p>';
        return;
      }
      wrap.innerHTML = links.map(l => {
        const url = escapeHtml(normalizeUrl(l.url));
        const click = `onclick="trackClick('${l.id}')"`;
        if (l.image) {
          return `<a class="link-banner" href="${url}" target="_blank" rel="noopener" ${click}>
            <img src="${l.image}" alt="${escapeHtml(l.title || 'Link')}" />
          </a>`;
        }
        return `<a class="link-btn" href="${url}" target="_blank" rel="noopener" ${click}>
          <div class="link-text"><div class="link-title">${escapeHtml(l.title || 'Link')}</div></div>
        </a>`;
      }).join('');
    }

    let LINKS = loadLinks();
    render(LINKS);

    /* Supabase (fetch leve, sem biblioteca) */
    const _SB_URL = 'https://wmzfehnczvdraeninzcf.supabase.co/rest/v1/site_config?id=eq.1&select=data';
    const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtemZlaG5jenZkcmFlbmluemNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjUwNjcsImV4cCI6MjA5NzkwMTA2N30.Z5kUqetdkEsidfZMV_zVhck2S0vV5tFcB24nqp5vJBY';

    /* ── ANALYTICS: registra a visita (1x por aba/sessão) ── */
    (function trackVisit(pageName) {
      try {
        const flag = 'tp_visit_' + pageName;
        if (sessionStorage.getItem(flag)) return;
        sessionStorage.setItem(flag, '1');
        const device = window.innerWidth < 768 ? 'mobile' : 'desktop';
        const payload = { page: pageName, device };
        fetch('https://ipapi.co/json/').then(r => r.ok ? r.json() : null).catch(() => null)
          .then(loc => {
            if (loc && !loc.error) {
              payload.country = loc.country_name || null;
              payload.region  = loc.region || null;
              payload.city    = loc.city || null;
            }
          })
          .finally(() => {
            fetch('https://wmzfehnczvdraeninzcf.supabase.co/rest/v1/page_visits', {
              method: 'POST',
              headers: { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
              body: JSON.stringify(payload),
            }).catch(() => {});
          });
      } catch (e) {}
    })('links');

    fetch(_SB_URL, { headers: { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY } })
      .then(r => r.json())
      .then(rows => {
        const remote = rows[0]?.data;
        if (!remote) return;
        localStorage.setItem('tp_data', JSON.stringify(remote));
        const remoteLinks = remote.links || [];
        if (JSON.stringify(remoteLinks) !== JSON.stringify(LINKS)) {
          LINKS = remoteLinks;
          render(LINKS);
        }
      })
      .catch(() => {});

    /* Contagem de cliques por link — como os links abrem em nova aba
       (target="_blank"), a página atual continua rodando e dá tempo do
       fetch terminar antes do usuário sair. */
    function trackClick(linkId) {
      try {
        const raw = localStorage.getItem('tp_data');
        if (!raw) return;
        const data = JSON.parse(raw);
        const link = (data.links || []).find(l => l.id === linkId);
        if (!link) return;
        link.clicks = (link.clicks || 0) + 1;
        localStorage.setItem('tp_data', JSON.stringify(data));
        fetch('https://wmzfehnczvdraeninzcf.supabase.co/rest/v1/site_config?id=eq.1', {
          method: 'PATCH',
          headers: {
            apikey: _SB_KEY,
            Authorization: 'Bearer ' + _SB_KEY,
            'Content-Type': 'application/json',
            Prefer: 'return=minimal',
          },
          body: JSON.stringify({ data, updated_at: new Date().toISOString() }),
        }).catch(() => {});
      } catch (e) {}
    }

    /* Seta de "tem mais conteúdo abaixo" — só mostra se a página realmente
       rolar, some assim que o usuário começa a descer ou chega no final. */
    function updateScrollHint() {
      const hint = document.getElementById('scrollHint');
      if (!hint) return;
      const scrollable = document.documentElement.scrollHeight > window.innerHeight + 40;
      const nearBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 24;
      hint.classList.toggle('hide', !scrollable || window.scrollY > 30 || nearBottom);
    }
    window.addEventListener('scroll', updateScrollHint, { passive: true });
    window.addEventListener('resize', updateScrollHint);
    setTimeout(updateScrollHint, 400);
  </script>

</body>
</html>
