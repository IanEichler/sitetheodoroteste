<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../logo-symbol-gold.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Todos os canais de contato da Theodoro & Porto Advocacia em um só lugar." />
  <title>Links — Theodoro &amp; Porto Advocacia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:      #133F3B;
      --forest-dark: #0d2e2b;
      --forest-deep: #081a18;
      --gold:        #C9A84C;
      --gold-light:  #E2C068;
    }

    html, body {
      min-height: 100%;
      background: radial-gradient(120% 90% at 50% -10%, #1a5850 0%, var(--forest-deep) 55%, #050e0d 100%);
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    body {
      display: flex;
      justify-content: center;
      padding: .6rem 1.25rem 3rem;
    }

    .page {
      width: 100%;
      max-width: 440px;
    }

    /* ── HEADER ── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-logo { height: 168px; width: auto; margin-bottom: .3rem; }
    .brand-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: .01em; }
    .brand-name em { color: var(--gold); font-style: normal; }
    .brand-sub { font-size: 1.3rem; color: var(--gold); margin-top: .5rem; }

    /* ── LINKS ── */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* Link com arte completa enviada pelo admin: a imagem crua É o botão, sem nenhum efeito */
    .link-banner {
      display: block;
      width: 100%;
      text-decoration: none;
      line-height: 0;
    }
    .link-banner img { display: block; width: 100%; height: auto; }

    /* Link sem imagem: botão de texto simples */
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 5.2rem;
      border-radius: 22px;
      padding: .75rem 1.5rem;
      text-decoration: none;
      text-align: center;
      background: linear-gradient(135deg, #1c5a53 0%, var(--forest) 45%, var(--forest-dark) 78%, #071815 100%);
      box-shadow: 0 12px 28px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .link-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.08); }
    .link-btn:active { transform: translateY(0); }

    .link-text { color: #fff; line-height: 1.28; }
    .link-title { font-size: 1.15rem; font-weight: 700; font-family: 'Syne', sans-serif; }

    .empty-msg { color: rgba(255,255,255,.55); font-size: .9rem; text-align: center; padding: 2rem 0; }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 3rem;
      text-align: center;
    }
    .page-footer a {
      color: var(--gold);
      font-size: .8rem;
      text-decoration: none;
      font-weight: 600;
    }
    .page-footer a:hover { text-decoration: underline; }
    .page-footer .copy {
      display: block;
      margin-top: .6rem;
      color: rgba(255,255,255,.3);
      font-size: .72rem;
    }

    @media (max-width: 380px) {
      .links-list { gap: .9rem; }
      .link-btn { min-height: 4.6rem; padding: .65rem 1.1rem; }
      .link-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="brand-header">
      <img class="brand-logo" src="../logo-gold.png" alt="Theodoro & Porto" onerror="this.style.display='none'" />
      <div class="brand-name">Nossos links</div>
      <div class="brand-sub">↓</div>
    </div>

    <div class="links-list" id="linksList">
      <p class="empty-msg">Carregando...</p>
    </div>

    <div class="page-footer">
      <a href="../index.html">← Voltar ao site</a>
      <span class="copy">© <span id="footerYear"></span> Theodoro &amp; Porto Advocacia</span>
    </div>
  </div>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    function loadLinks() {
      try {
        const saved = JSON.parse(localStorage.getItem('tp_data') || '{}');
        return saved.links || [];
      } catch (e) { return []; }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    /* Corrige links salvos sem protocolo (ex: "wa.me/55...") que o navegador
       trataria como caminho relativo desta página, não como link externo. */
    function normalizeUrl(url) {
      url = (url || '').trim();
      if (!url) return url;
      if (/^(https?:|mailto:|tel:)/i.test(url)) return url;
      return 'https://' + url;
    }

    function render(links) {
      const wrap = document.getElementById('linksList');
      if (!links || !links.length) {
        wrap.innerHTML = '<p class="empty-msg">Nenhum link disponível no momento.</p>';
        return;
      }
      wrap.innerHTML = links.map(l => {
        const url = escapeHtml(normalizeUrl(l.url));
        if (l.image) {
          return `<a class="link-banner" href="${url}" target="_blank" rel="noopener">
            <img src="${l.image}" alt="${escapeHtml(l.title || 'Link')}" />
          </a>`;
        }
        return `<a class="link-btn" href="${url}" target="_blank" rel="noopener">
          <div class="link-text"><div class="link-title">${escapeHtml(l.title || 'Link')}</div></div>
        </a>`;
      }).join('');
    }

    let LINKS = loadLinks();
    render(LINKS);

    /* Supabase (fetch leve, sem biblioteca) */
    const _SB_URL = 'https://wmzfehnczvdraeninzcf.supabase.co/rest/v1/site_config?id=eq.1&select=data';
    const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtemZlaG5jenZkcmFlbmluemNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjUwNjcsImV4cCI6MjA5NzkwMTA2N30.Z5kUqetdkEsidfZMV_zVhck2S0vV5tFcB24nqp5vJBY';

    fetch(_SB_URL, { headers: { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY } })
      .then(r => r.json())
      .then(rows => {
        const remote = rows[0]?.data;
        if (!remote) return;
        localStorage.setItem('tp_data', JSON.stringify(remote));
        const remoteLinks = remote.links || [];
        if (JSON.stringify(remoteLinks) !== JSON.stringify(LINKS)) {
          LINKS = remoteLinks;
          render(LINKS);
        }
      })
      .catch(() => {});
  </script>

</body>
</html>
